# اختياري: فعّل هذا إذا عندك Ingress Controller (مثل nginx-ingress)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: towseasons
  namespace: towseasons
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: towseasons.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000
