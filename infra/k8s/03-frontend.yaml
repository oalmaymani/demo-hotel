apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: towseasons
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: towseasons-frontend:local
          imagePullPolicy: IfNotPresent
          env:
            - name: NEXT_PUBLIC_API_BASE
              value: "http://backend:4000"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: towseasons
spec:
  selector: { app: frontend }
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
