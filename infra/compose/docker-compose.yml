name: demo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: towseasons
      POSTGRES_USER: towseasons
      POSTGRES_PASSWORD: towseasons
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U towseasons -d towseasons"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ../../apps/backend
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://towseasons:towseasons@postgres:5432/towseasons?schema=public
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: admin@demo.local
      ADMIN_PASSWORD: Admin@12345
      CORS_ORIGIN: http://localhost:3001
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM: osaid1418@gmail.com
      SENDGRID_FROM_NAME: منشئة ايواء
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:4000"
    volumes:
      - backend_uploads:/app/uploads
    command: >
      sh -lc "
        npx prisma db push --accept-data-loss &&
        node prisma/seed.js &&
        node dist/index.js
      "

  frontend:
    build:
      context: ../../apps/frontend
    environment:
      NEXT_PUBLIC_API_BASE: ""
      API_INTERNAL_BASE: http://backend:4000
    depends_on:
      - backend
    ports:
      - "3001:3000"

volumes:
  pgdata:
  backend_uploads:
