name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: |
          cd apps/backend
          cp .env.example .env
          npx prisma validate --schema=prisma/schema.prisma

      - name: Run lint
        run: npm run lint

      - name: Run build (Backend)
        run: npm run build --workspace=@towseasons/backend

      - name: Run build (Frontend)
        run: npm run build --workspace=@towseasons/frontend

      - name: Verify deployment configuration
        run: |
          if [ ! -f "infra/compose/docker-compose.yml" ]; then
            echo "Docker compose file not found!"
            exit 1
          fi
          docker compose -f infra/compose/docker-compose.yml config > /dev/null
